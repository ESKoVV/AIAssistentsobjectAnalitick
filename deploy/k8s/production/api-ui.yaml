apiVersion: apps/v1
kind: Deployment
metadata:
  name: public-api
  namespace: regional-analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: public-api
  template:
    metadata:
      labels:
        app: public-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: public-api
          image: regional-analytics/api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: regional-analytics-config
            - secretRef:
                name: regional-analytics-secrets
---
apiVersion: v1
kind: Service
metadata:
  name: public-api
  namespace: regional-analytics
spec:
  selector:
    app: public-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
  namespace: regional-analytics
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ui
  template:
    metadata:
      labels:
        app: ui
    spec:
      containers:
        - name: ui
          image: regional-analytics/ui:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ui
  namespace: regional-analytics
spec:
  selector:
    app: ui
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-metrics-exporter
  namespace: regional-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-metrics-exporter
  template:
    metadata:
      labels:
        app: db-metrics-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9108"
        prometheus.io/path: /metrics
    spec:
      containers:
        - name: db-metrics-exporter
          image: regional-analytics/api:latest
          command: ["python", "-m", "apps.ops.db_metrics_exporter"]
          ports:
            - containerPort: 9108
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: regional-analytics-secrets
                  key: DATABASE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: db-metrics-exporter
  namespace: regional-analytics
spec:
  selector:
    app: db-metrics-exporter
  ports:
    - port: 9108
      targetPort: 9108
