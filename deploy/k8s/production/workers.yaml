apiVersion: batch/v1
kind: CronJob
metadata:
  name: clustering-incremental
  namespace: regional-analytics
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: clustering-incremental
              image: regional-analytics/python-worker:latest
              command: ["python", "-m", "apps.orchestration.runtime.run_clustering_incremental"]
              envFrom:
                - configMapRef:
                    name: regional-analytics-config
                - secretRef:
                    name: regional-analytics-secrets
---
apiVersion: batch/v1
