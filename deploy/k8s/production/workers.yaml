apiVersion: apps/v1
kind: Deployment
metadata:
  name: alicagpt
  namespace: regional-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alicagpt
  template:
    metadata:
      labels:
        app: alicagpt
    spec:
      containers:
        - name: alicagpt
          image: vllm/vllm-openai:v0.5.5
          command: ["/bin/sh", "-lc"]
          args:
            - >-
              test -n "$SUMMARIZATION_ALICAGPT_MODEL_NAME" &&
              exec vllm serve "$SUMMARIZATION_ALICAGPT_MODEL_NAME" --host 0.0.0.0 --port 8000
          envFrom:
            - configMapRef:
                name: regional-analytics-config
            - secretRef:
                name: regional-analytics-secrets
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: alicagpt
  namespace: regional-analytics
spec:
  selector:
    app: alicagpt
  ports:
    - port: 8000
      targetPort: 8000
