apiVersion: apps/v1
kind: Deployment
metadata:
  name: raw-consumer
  namespace: regional-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: raw-consumer
  template:
    metadata:
      labels:
        app: raw-consumer
    spec:
      containers:
        - name: raw-consumer
          image: regional-analytics/python-worker:latest
          command: ["python", "parser_project/consumer.py"]
          envFrom:
            - configMapRef:
                name: regional-analytics-config
            - secretRef:
                name: regional-analytics-secrets
---
